<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exportar Registro Pedagógico</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<style>
:root{--azul:#1a3a6b;--verde:#059669;--rojo:#dc2626;--gris:#f1f5f9;--borde:#e2e8f0}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:var(--gris);min-height:100vh;padding:16px}
.card{background:#fff;border-radius:16px;padding:20px;max-width:500px;margin:0 auto;box-shadow:0 4px 20px rgba(0,0,0,.1)}
h1{color:var(--azul);font-size:18px;margin-bottom:4px}
.sub{font-size:12px;color:#64748b;margin-bottom:20px}
.fg{margin-bottom:14px}
label{display:block;font-size:11px;font-weight:600;color:#64748b;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
select,input{width:100%;padding:9px 12px;border:1.5px solid var(--borde);border-radius:8px;font-size:13px;outline:none;background:#fff}
select:focus,input:focus{border-color:var(--azul)}
.btn{width:100%;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;margin-top:6px}
.btn-p{background:var(--azul);color:#fff}
.btn-p:hover{opacity:.9}
.btn-p:disabled{background:#94a3b8;cursor:not-allowed}
.btn-g{background:var(--verde);color:#fff;margin-top:10px}
.progress{display:none;margin-top:14px;background:#f1f5f9;border-radius:8px;padding:12px}
.prog-bar{height:6px;background:#e2e8f0;border-radius:3px;margin:8px 0}
.prog-fill{height:100%;background:var(--azul);border-radius:3px;transition:width .3s;width:0%}
.prog-msg{font-size:12px;color:#64748b}
.log{max-height:120px;overflow-y:auto;margin-top:8px;font-size:11px;color:#475569;line-height:1.6}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;margin-left:6px}
.badge-ok{background:#dcfce7;color:#065f46}
.badge-err{background:#fee2e2;color:#dc2626}
</style>
</head>
<body>
<div class="card">
  <h1>📊 Exportar Registro Oficial</h1>
  <p class="sub">Genera el Excel con formato del Ministerio de Educación Bolivia</p>

  <div class="fg">
    <label>Email del docente</label>
    <input type="email" id="inp-email" placeholder="docente@gmail.com">
  </div>
  <div class="fg">
    <label>Curso</label>
    <select id="inp-curso"><option value="">— Primero ingresa el email —</option></select>
  </div>
  <div class="fg">
    <label>Materia / Área</label>
    <select id="inp-materia"><option value="">— Selecciona curso primero —</option></select>
  </div>
  <div class="fg">
    <label>Trimestre</label>
    <select id="inp-trim">
      <option value="1">1er Trimestre</option>
      <option value="2">2do Trimestre</option>
      <option value="3">3er Trimestre</option>
    </select>
  </div>
  <div class="fg">
    <label>Unidad Educativa</label>
    <input type="text" id="inp-ue" value="Franz Tamayo de Chachacomani">
  </div>

  <button class="btn btn-p" id="btn-cargar" onclick="cargarDatos()">🔍 Cargar datos del docente</button>
  <button class="btn btn-g" id="btn-export" onclick="exportarExcel()" style="display:none">📥 Descargar Excel Registro</button>

  <div class="progress" id="progress">
    <div class="prog-msg" id="prog-msg">Iniciando...</div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
    <div class="log" id="log"></div>
  </div>
</div>

<script>
const SUPA_URL='https://dmhkidkzriiorctxmwzv.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtaGtpZGt6cmlpb3JjdHhtd3p2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MDEyNjAsImV4cCI6MjA4OTI3NzI2MH0.XkRFktuBo051m-CLsso4dhPcj2oOzUZEHRLyC4jGMRg';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);

let DOCENTE=null, CURSOS=[], ESTUDIANTES=[], ACTIVIDADES=[], NOTAS={}, AUTOEVALS={};

function log(msg){ const d=document.getElementById('log'); d.innerHTML+=msg+'<br>'; d.scrollTop=d.scrollHeight; }
function prog(pct,msg){ document.getElementById('prog-fill').style.width=pct+'%'; document.getElementById('prog-msg').textContent=msg; }

async function cargarDatos(){
  const email=document.getElementById('inp-email').value.trim().toLowerCase();
  if(!email){ alert('Ingresa el email del docente'); return; }
  document.getElementById('progress').style.display='block';
  prog(10,'Buscando docente...');
  const id='D_'+email.replace(/[@.]/g,'_').replace(/[^a-z0-9_]/gi,'');
  log('🔍 Buscando docente con id: '+id);
  const {data:doc}=await sb.from('docentes').select('*').eq('id',id).single();
  if(!doc){ log('❌ Docente no encontrado'); prog(0,'Error'); return; }
  DOCENTE=doc;
  log('✓ Docente: '+doc.nombre);
  prog(30,'Cargando cursos...');
  const {data:cursos}=await sb.from('asignaciones').select('*').eq('id_docente',id);
  CURSOS=cursos||[];
  log('✓ '+CURSOS.length+' curso(s) encontrado(s)');
  // Llenar selector cursos
  const sc=document.getElementById('inp-curso');
  sc.innerHTML='<option value="">— Selecciona —</option>';
  [...new Set(CURSOS.map(c=>c.curso))].forEach(c=>{ sc.innerHTML+=`<option value="${c}">${c}</option>`; });
  sc.onchange=()=>{
    const curso=sc.value;
    const sm=document.getElementById('inp-materia');
    sm.innerHTML='<option value="">— Selecciona —</option>';
    CURSOS.filter(c=>c.curso===curso).forEach(c=>{ sm.innerHTML+=`<option value="${c.materia}">${c.materia}</option>`; });
  };
  prog(100,'✓ Datos cargados — selecciona curso y materia');
  document.getElementById('btn-export').style.display='block';
}

async function exportarExcel(){
  const curso=document.getElementById('inp-curso').value;
  const materia=document.getElementById('inp-materia').value;
  const trim=document.getElementById('inp-trim').value;
  const ue=document.getElementById('inp-ue').value;
  if(!curso||!materia){ alert('Selecciona curso y materia'); return; }

  document.getElementById('progress').style.display='block';
  document.getElementById('log').innerHTML='';
  prog(5,'Cargando estudiantes...');

  const id=DOCENTE.id;
  const {data:ests}=await sb.from('estudiantes').select('*').eq('id_docente',id).eq('curso',curso).eq('materia',materia);
  ESTUDIANTES=(ests||[]).sort((a,b)=>a.nombre.localeCompare(b.nombre));
  log('✓ Estudiantes: '+ESTUDIANTES.length);
  prog(20,'Cargando actividades...');

  const {data:acts}=await sb.from('actividades').select('*').eq('id_docente',id).eq('curso',curso).eq('materia',materia).eq('trimestre',trim);
  ACTIVIDADES=acts||[];
  log('✓ Actividades: '+ACTIVIDADES.length);
  prog(40,'Cargando notas...');

  const {data:notasArr}=await sb.from('notas').select('*').eq('id_docente',id).eq('curso',curso).eq('materia',materia).eq('trimestre',trim);
  NOTAS={};
  (notasArr||[]).forEach(n=>{ if(!NOTAS[n.id_estudiante]) NOTAS[n.id_estudiante]={}; NOTAS[n.id_estudiante][n.id_actividad]=parseFloat(n.nota); });
  log('✓ Notas cargadas: '+(notasArr||[]).length+' registros');
  prog(60,'Cargando autoevaluaciones...');

  const {data:autoArr}=await sb.from('autoevaluacion').select('*').eq('id_docente',id).eq('curso',curso).eq('materia',materia).eq('trimestre',trim);
  AUTOEVALS={};
  (autoArr||[]).forEach(a=>{ AUTOEVALS[a.id_estudiante]=parseFloat(a.nota); });
  log('✓ Autoevaluaciones: '+(autoArr||[]).length);
  prog(75,'Generando Excel...');

  try{
    await generarExcel1T(curso,materia,trim,ue);
    prog(100,'✓ Excel generado exitosamente');
    log('✅ Descarga iniciada');
  }catch(e){
    log('❌ Error: '+e.message);
    prog(0,'Error al generar Excel');
    console.error(e);
  }
}

async function generarExcel1T(curso,materia,trim,ue){
  const wb=new ExcelJS.Workbook();
  wb.creator='Registro Pedagógico 2026';
  wb.created=new Date();

  const ws=wb.addWorksheet('Registro 1T',{
    pageSetup:{paperSize:9,orientation:'landscape',fitToPage:true,fitToWidth:1,fitToHeight:0}
  });

  // ===== COLORES =====
  const C_SER     = 'FFD9E1F2'; // azul pálido
  const C_SABER   = 'FFE8A9F5'; // violeta pálido
  const C_HACER   = 'FF77EDCE'; // verde pálido
  const C_NOMBRE  = 'FFF3F599'; // amarillo pálido
  const C_HEADER  = 'FF1A3A6B'; // azul oscuro
  const C_PROM_SER= 'FFB4C6E7'; // azul medio
  const C_PROM_SAB= 'FFD4A4F0'; // violeta medio
  const C_PROM_HAC= 'FF4ADDB8'; // verde medio
  const C_TOTAL   = 'FFFFD966'; // amarillo
  const C_AUTO    = 'FFFCE4D6'; // naranja pálido
  const C_ESTADO  = 'FFE2EFDA'; // verde muy pálido

  // ===== SEPARAR ACTIVIDADES POR DIMENSIÓN =====
  const serActs   = ACTIVIDADES.filter(a=>a.dimension==='SER');
  const saberActs = ACTIVIDADES.filter(a=>a.dimension==='SABER');
  const hacerActs = ACTIVIDADES.filter(a=>a.dimension==='HACER');
  // Máximo del formato original: SER=4, SABER=10, HACER=17 — usar máximo 4,10,17 o las que haya
  const maxSer  = Math.max(serActs.length, 1);
  const maxSaber= Math.max(saberActs.length, 1);
  const maxHacer= Math.max(hacerActs.length, 1);

  // ===== CALCULAR COLUMNAS =====
  // Col 1=Nº, 2=Apellidos, 3-4=merge nombre
  // SER: col 5 a 5+maxSer-1, PROM_SER: 5+maxSer
  // SABER: siguiente, PROM_SABER: ...
  // HACER: siguiente, PROM_HACER: ...
  // TOTAL, AUTO, PROM_FINAL, ESTADO
  const COL_NUM=1, COL_NOM=2;
  const COL_SER_START=5;
  const COL_SER_END=COL_SER_START+maxSer-1;
  const COL_PROM_SER=COL_SER_END+1;
  const COL_SAB_START=COL_PROM_SER+1;
  const COL_SAB_END=COL_SAB_START+maxSaber-1;
  const COL_PROM_SAB=COL_SAB_END+1;
  const COL_HAC_START=COL_PROM_SAB+1;
  const COL_HAC_END=COL_HAC_START+maxHacer-1;
  const COL_PROM_HAC=COL_HAC_END+1;
  const COL_TOTAL=COL_PROM_HAC+1;
  const COL_AUTO=COL_TOTAL+1;
  const COL_PROM_FINAL=COL_AUTO+1;
  const COL_ESTADO=COL_PROM_FINAL+1;
  const TOTAL_COLS=COL_ESTADO;

  // ===== ANCHOS DE COLUMNA =====
  ws.getColumn(COL_NUM).width=4;
  ws.getColumn(COL_NOM).width=28;
  for(let c=3;c<=4;c++) ws.getColumn(c).width=3;
  for(let c=COL_SER_START;c<=COL_SER_END;c++) ws.getColumn(c).width=9;
  ws.getColumn(COL_PROM_SER).width=9;
  for(let c=COL_SAB_START;c<=COL_SAB_END;c++) ws.getColumn(c).width=9;
  ws.getColumn(COL_PROM_SAB).width=9;
  for(let c=COL_HAC_START;c<=COL_HAC_END;c++) ws.getColumn(c).width=9;
  ws.getColumn(COL_PROM_HAC).width=9;
  ws.getColumn(COL_TOTAL).width=9;
  ws.getColumn(COL_AUTO).width=9;
  ws.getColumn(COL_PROM_FINAL).width=9;
  ws.getColumn(COL_ESTADO).width=12;

  // ===== HELPER FUNCIONES =====
  function setCell(r,c,val,opts={}){
    const cell=ws.getCell(r,c);
    cell.value=val;
    cell.alignment={vertical:'middle',horizontal:opts.align||'center',wrapText:true};
    if(opts.bg) cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:opts.bg}};
    if(opts.bold||opts.header) cell.font={bold:true,size:opts.size||9,color:{argb:opts.color||(opts.header?'FFFFFFFF':'FF000000')},name:'Calibri'};
    else cell.font={size:opts.size||9,color:{argb:opts.color||'FF000000'},name:'Calibri'};
    if(opts.border||opts.allborder){
      const bs={style:'thin',color:{argb:'FF000000'}};
      cell.border={top:bs,left:bs,bottom:bs,right:bs};
    }
    return cell;
  }

  function mergeSet(r,c1,c2,val,opts={}){
    if(c1<c2) ws.mergeCells(r,c1,r,c2);
    setCell(r,c1,val,opts);
  }

  function colLetter(n){ // 1=A, 2=B...
    let s=''; while(n>0){ s=String.fromCharCode(65+(n-1)%26)+s; n=Math.floor((n-1)/26); } return s;
  }

  // ===== FILA 1: TÍTULO UE =====
  ws.getRow(1).height=18;
  mergeSet(1,1,TOTAL_COLS,'UNIDAD EDUCATIVA TÉCNICO HUMANÍSTICA: '+ue.toUpperCase(),{bg:'FF1A3A6B',bold:true,size:11,color:'FFFFFFFF',align:'center',border:true});

  // ===== FILA 2: SUBTÍTULO =====
  ws.getRow(2).height=15;
  mergeSet(2,1,TOTAL_COLS,'REGISTRO DE EVALUACIÓN — GESTIÓN 2026',{bg:'FF2563EB',bold:true,size:10,color:'FFFFFFFF',align:'center',border:true});

  // ===== FILA 3: DOCENTE Y CURSO =====
  ws.getRow(3).height=16;
  mergeSet(3,1,4,'MAESTRA(O):',{bold:true,size:9,align:'left',bg:'FFDCE6F1',border:true});
  mergeSet(3,5,COL_TOTAL-1,DOCENTE.nombre,{size:9,align:'left',bg:'FFFFFFFF',border:true});
  mergeSet(3,COL_TOTAL,COL_TOTAL+1,'CURSO:',{bold:true,size:9,bg:'FFDCE6F1',border:true});
  mergeSet(3,COL_TOTAL+2,TOTAL_COLS,curso,{bold:true,size:10,bg:'FFFFFFFF',border:true});

  // ===== FILA 4: ASIGNATURA =====
  ws.getRow(4).height=16;
  mergeSet(4,1,4,'ASIGNATURA:',{bold:true,size:9,align:'left',bg:'FFDCE6F1',border:true});
  mergeSet(4,5,TOTAL_COLS,materia.toUpperCase(),{bold:true,size:10,align:'left',bg:'FFFFFFFF',border:true});

  // ===== FILA 5: TRIMESTRE =====
  ws.getRow(5).height=14;
  const trimNombres={'1':'PRIMER TRIMESTRE','2':'SEGUNDO TRIMESTRE','3':'TERCER TRIMESTRE'};
  mergeSet(5,1,4,'',{bg:'FFDCE6F1',border:true});
  mergeSet(5,COL_SER_START,COL_PROM_HAC,trimNombres[trim],{bold:true,size:10,bg:'FFD9E1F2',border:true});
  mergeSet(5,COL_TOTAL,COL_TOTAL,'EVAL.\nTOTAL',{bold:true,size:8,bg:C_TOTAL,border:true});
  mergeSet(5,COL_AUTO,COL_AUTO,'AUTO\nEVAL.',{bold:true,size:8,bg:C_AUTO,border:true});
  mergeSet(5,COL_PROM_FINAL,COL_PROM_FINAL,'PROM.\nFINAL',{bold:true,size:8,bg:'FFFFE699',border:true});
  mergeSet(5,COL_ESTADO,COL_ESTADO,'ESTADO',{bold:true,size:8,bg:C_ESTADO,border:true});

  // ===== FILA 6: SER / SABER / HACER labels =====
  ws.getRow(6).height=14;
  mergeSet(6,1,4,'Valoración del Docente',{bold:true,size:9,bg:'FFE2EFDA',border:true});
  mergeSet(6,COL_SER_START,COL_PROM_SER,'SER — 10 pts',{bold:true,size:9,bg:C_SER,border:true});
  mergeSet(6,COL_SAB_START,COL_PROM_SAB,'SABER — 45 pts',{bold:true,size:9,bg:C_SABER,border:true});
  mergeSet(6,COL_HAC_START,COL_PROM_HAC,'HACER — 40 pts',{bold:true,size:9,bg:C_HACER,border:true});
  setCell(6,COL_TOTAL,'',{bg:C_TOTAL,border:true});
  setCell(6,COL_AUTO,'',{bg:C_AUTO,border:true});
  setCell(6,COL_PROM_FINAL,'',{bg:'FFFFE699',border:true});
  setCell(6,COL_ESTADO,'',{bg:C_ESTADO,border:true});

  // ===== FILA 7: encabezados actividades (texto vertical) =====
  ws.getRow(7).height=70;
  mergeSet(7,1,4,'Nº  |  APELLIDOS Y NOMBRES',{bold:true,size:9,bg:C_NOMBRE,border:true,align:'center'});

  // SER actividades
  for(let i=0;i<maxSer;i++){
    const col=COL_SER_START+i;
    const act=serActs[i];
    const cell=setCell(7,col,act?act.nombre_actividad:'—',{bold:false,size:8,bg:C_SER,border:true});
    cell.alignment={textRotation:90,vertical:'bottom',horizontal:'center',wrapText:false};
  }
  setCell(7,COL_PROM_SER,'PROMEDIO\nSER',{bold:true,size:8,bg:C_PROM_SER,border:true});

  // SABER actividades
  for(let i=0;i<maxSaber;i++){
    const col=COL_SAB_START+i;
    const act=saberActs[i];
    const cell=setCell(7,col,act?act.nombre_actividad:'—',{bold:false,size:8,bg:C_SABER,border:true});
    cell.alignment={textRotation:90,vertical:'bottom',horizontal:'center',wrapText:false};
  }
  setCell(7,COL_PROM_SAB,'PROMEDIO\nSABER',{bold:true,size:8,bg:C_PROM_SAB,border:true});

  // HACER actividades
  for(let i=0;i<maxHacer;i++){
    const col=COL_HAC_START+i;
    const act=hacerActs[i];
    const cell=setCell(7,col,act?act.nombre_actividad:'—',{bold:false,size:8,bg:C_HACER,border:true});
    cell.alignment={textRotation:90,vertical:'bottom',horizontal:'center',wrapText:false};
  }
  setCell(7,COL_PROM_HAC,'PROMEDIO\nHACER',{bold:true,size:8,bg:C_PROM_HAC,border:true});

  setCell(7,COL_TOTAL,'VALORACIÓN\nTOTAL',{bold:true,size:8,bg:C_TOTAL,border:true});
  setCell(7,COL_AUTO,'AUTO\nEVAL. (5)',{bold:true,size:8,bg:C_AUTO,border:true});
  setCell(7,COL_PROM_FINAL,'PROM.\nTRIM.',{bold:true,size:8,bg:'FFFFE699',border:true});
  setCell(7,COL_ESTADO,'ESTADO',{bold:true,size:8,bg:C_ESTADO,border:true});

  // ===== FILAS DE ESTUDIANTES =====
  function promDim(estId,acts){
    if(!acts.length) return null;
    const ns=acts.map(a=>NOTAS[estId]?.[a.id]).filter(n=>n!==undefined&&n!==null);
    if(!ns.length) return null;
    return ns.reduce((s,n)=>s+n,0)/ns.length;
  }

  for(let i=0;i<ESTUDIANTES.length;i++){
    const e=ESTUDIANTES[i];
    const row=8+i;
    ws.getRow(row).height=14;

    const bg=i%2===0?'FFFFFFFF':'FFF7F9FC';

    // Nº + Nombre
    setCell(row,COL_NUM,i+1,{bold:true,size:9,bg:bg,border:true});
    const nc=ws.getCell(row,COL_NOM);
    nc.value=e.nombre;
    nc.alignment={vertical:'middle',horizontal:'left',wrapText:false};
    nc.fill={type:'pattern',pattern:'solid',fgColor:{argb:bg}};
    nc.font={bold:true,size:9,name:'Calibri'};
    const bst={style:'thin',color:{argb:'FF000000'}};
    nc.border={top:bst,left:bst,bottom:bst,right:bst};
    // Merge nombre cols 2-4
    try{ ws.mergeCells(row,2,row,4); }catch(e){}

    // SER notas
    for(let j=0;j<maxSer;j++){
      const col=COL_SER_START+j;
      const act=serActs[j];
      const nota=act?NOTAS[e.id]?.[act.id]:null;
      setCell(row,col,nota!==undefined&&nota!==null?nota:'',{size:9,bg:i%2===0?'FFEFF6FF':'FFE8F4FF',border:true});
    }
    const pSer=promDim(e.id,serActs);
    setCell(row,COL_PROM_SER,pSer!==null?parseFloat(pSer.toFixed(2)):'',{bold:true,size:9,bg:C_PROM_SER,border:true});

    // SABER notas (sobre 100, se convierte ×0.45)
    for(let j=0;j<maxSaber;j++){
      const col=COL_SAB_START+j;
      const act=saberActs[j];
      const nota=act?NOTAS[e.id]?.[act.id]:null;
      setCell(row,col,nota!==undefined&&nota!==null?nota:'',{size:9,bg:i%2===0?'FFF5F3FF':'FFEDE9FE',border:true});
    }
    const pSab=promDim(e.id,saberActs);
    const pSabConv=pSab!==null?parseFloat((pSab*0.45).toFixed(2)):null;
    setCell(row,COL_PROM_SAB,pSabConv!==null?pSabConv:'',{bold:true,size:9,bg:C_PROM_SAB,border:true});

    // HACER notas (sobre 100, se convierte ×0.40)
    for(let j=0;j<maxHacer;j++){
      const col=COL_HAC_START+j;
      const act=hacerActs[j];
      const nota=act?NOTAS[e.id]?.[act.id]:null;
      setCell(row,col,nota!==undefined&&nota!==null?nota:'',{size:9,bg:i%2===0?'FFF0FDF4':'FFE6FAF2',border:true});
    }
    const pHac=promDim(e.id,hacerActs);
    const pHacConv=pHac!==null?parseFloat((pHac*0.40).toFixed(2)):null;
    setCell(row,COL_PROM_HAC,pHacConv!==null?pHacConv:'',{bold:true,size:9,bg:C_PROM_HAC,border:true});

    // TOTAL = SER_prom + SABER×0.45 + HACER×0.40
    const total=(pSer!==null||pSabConv!==null||pHacConv!==null)?
      parseFloat(((pSer||0)+(pSabConv||0)+(pHacConv||0)).toFixed(2)):null;
    setCell(row,COL_TOTAL,total!==null?total:'',{bold:true,size:9,bg:C_TOTAL,border:true});

    // AUTOEVALUACIÓN
    const auto=AUTOEVALS[e.id]||null;
    setCell(row,COL_AUTO,auto!==null?auto:'',{size:9,bg:C_AUTO,border:true});

    // PROMEDIO FINAL = total + auto
    const promFinal=total!==null?parseFloat((total+(auto||0)).toFixed(2)):null;
    setCell(row,COL_PROM_FINAL,promFinal!==null?promFinal:'',{bold:true,size:9,bg:'FFFFE699',border:true});

    // ESTADO
    let estado='', estColor='FF000000', estBg=C_ESTADO;
    if(promFinal!==null){
      if(promFinal>=51){ estado='APROBADO'; estColor='FF065F46'; estBg='FFD1FAE5'; }
      else{ estado='REPROBADO'; estColor='FF991B1B'; estBg='FFFEE2E2'; }
    }
    setCell(row,COL_ESTADO,estado,{bold:true,size:9,bg:estBg,color:estColor,border:true});
  }

  // ===== FILA TOTALES =====
  const rowTot=8+ESTUDIANTES.length;
  ws.getRow(rowTot).height=14;
  mergeSet(rowTot,1,4,'TOTAL ESTUDIANTES: '+ESTUDIANTES.length,{bold:true,size:9,bg:'FFDCE6F1',border:true,align:'left'});
  // Contar aprobados
  let aprobados=0;
  ESTUDIANTES.forEach(e=>{
    const pSer=promDim(e.id,serActs);
    const pSab=promDim(e.id,saberActs);
    const pHac=promDim(e.id,hacerActs);
    const auto=AUTOEVALS[e.id]||0;
    const t=(pSer||0)+(pSab!==null?pSab*0.45:0)+(pHac!==null?pHac*0.40:0)+auto;
    if(t>=51) aprobados++;
  });
  mergeSet(rowTot,COL_ESTADO,COL_ESTADO,'Aprobados: '+aprobados+'/'+ ESTUDIANTES.length,{bold:true,size:9,bg:'FFD1FAE5',border:true});

  // ===== DESCARGAR =====
  const buffer=await wb.xlsx.writeBuffer();
  const blob=new Blob([buffer],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`Registro_${curso}_${materia.replace(/[/:]/g,'-')}_Trim${trim}_2026.xlsx`;
  a.click();
  URL.revokeObjectURL(url);
  log('📁 Archivo: Registro_'+curso+'_Trim'+trim+'_2026.xlsx');
}
</script>
</body>
