<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exportador Profesional 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
    <style>
        :root { --azul: #1a3a6b; --verde: #059669; --gris: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center; width: 100%; max-width: 450px; }
        .btn { background: var(--verde); color: white; border: none; padding: 18px 30px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn:hover { background: #047857; transform: translateY(-2px); }
        .status { margin-top: 20px; color: #64748b; font-size: 14px; border-top: 1px solid #e2e8f0; padding-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h1 style="color: var(--azul); margin: 0 0 10px 0;">REPORTE OFICIAL</h1>
    <p style="color: #64748b; margin-bottom: 30px;">Gestión Educativa 2026</p>
    <button class="btn" onclick="generarExcelPerfecto()">GENERAR EXCEL AHORA</button>
    <div id="status" class="status">Listo para procesar datos...</div>
</div>

<script>
async function generarExcelPerfecto() {
    const status = document.getElementById('status');
    status.innerText = "Procesando... por favor espere.";
    
    // 1. OBTENCIÓN DE DATOS (Surgical Check)
    const DOCENTE = JSON.parse(localStorage.getItem('docente')) || { nombre: "MAESTRO", colegio: "U.E. BOLIVIA" };
    const ESTUDIANTES = JSON.parse(localStorage.getItem('estudiantes_local')) || [];
    const ACTIVIDADES = JSON.parse(localStorage.getItem('actividades_local')) || [];
    const NOTAS = JSON.parse(localStorage.getItem('notas_local')) || {};
    const cursoSel = localStorage.getItem('curso_exportar') || "CURSO";
    const materiaSel = localStorage.getItem('materia_exportar') || "MATERIA";
    const trimActual = localStorage.getItem('trim_exportar') || "1";

    const wb = new ExcelJS.Workbook();
    
    // Estilos constantes
    const borderBlack = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
    const alnCenter = { vertical: 'middle', horizontal: 'center', wrapText: true };

    // --- HOJA 1: REGISTRO T1/T2/T3 ---
    const ws = wb.addWorksheet(`REGISTRO T${trimActual}`, {
        pageSetup: { paperSize: 1, orientation: 'landscape', fitToPage: true, fitToWidth: 1 }
    });

    // Configuración de Dimensiones Mínimas (4, 9, 9)
    const actsSer = ACTIVIDADES.filter(a => a.dimension === 'SER' && a.trimestre == trimActual);
    const actsSaber = ACTIVIDADES.filter(a => a.dimension === 'SABER' && a.trimestre == trimActual);
    const actsHacer = ACTIVIDADES.filter(a => a.dimension === 'HACER' && a.trimestre == trimActual);

    const nS = Math.max(4, actsSer.length);
    const nSa = Math.max(9, actsSaber.length);
    const nH = Math.max(9, actsHacer.length);
    const totalCols = 2 + nS + nSa + nH + 4; // Nº, Nombre, Dim, Totales

    // Ajuste de Ancho dinámico
    const anchoCol = totalCols > 25 ? 2.5 : 3.8;
    ws.getColumn(1).width = 4;
    ws.getColumn(2).width = 35;
    for(let i=3; i<=totalCols; i++) ws.getColumn(i).width = anchoCol;

    // ENCABEZADOS PROFESIONALES
    ws.mergeCells(1,1,2,totalCols);
    const cellT = ws.getCell(1,1);
    cellT.value = `${DOCENTE.colegio.toUpperCase()} - REGISTRO PEDAGÓGICO 2026`;
    cellT.font = { bold: true, size: 14 };
    cellT.alignment = alnCenter;

    ws.getRow(4).values = ["", `MAESTRO: ${DOCENTE.nombre}`, "", `CURSO: ${cursoSel}`, "", `MATERIA: ${materiaSel}`];
    
    // CABECERA DE TABLA
    let cActual = 3;
    const crearSeccion = (titulo, n, color) => {
        ws.mergeCells(6, cActual, 6, cActual + n - 1);
        const cell = ws.getCell(6, cActual);
        cell.value = titulo;
        cell.fill = { type: 'pattern', pattern:'solid', fgColor:{argb: color} };
        cell.alignment = alnCenter;
        cell.border = borderBlack;
        cActual += n;
    };

    crearSeccion("SER (10 PTS)", nS, "FFD9E1F2");
    crearSeccion("SABER (45 PTS)", nSa, "FFE2EFDA");
    crearSeccion("HACER (40 PTS)", nH, "FFFFF2CC");

    ws.mergeCells(6, cActual, 7, cActual);
    ws.getCell(6, cActual).value = "PROM. FINAL";
    ws.getCell(6, cActual).alignment = alnCenter;
    ws.getCell(6, cActual).border = borderBlack;

    // FILAS DE DATOS (Mínimo 30)
    const filasMax = Math.max(30, ESTUDIANTES.length);
    for(let i=0; i < filasMax; i++){
        const rIdx = 8 + i;
        const est = ESTUDIANTES[i];
        ws.getCell(rIdx, 1).value = i + 1;
        ws.getCell(rIdx, 2).value = est ? est.nombre : "";
        for(let c=1; c <= cActual; c++) ws.getCell(rIdx, c).border = borderBlack;
    }

    // --- HOJA 2: ASISTENCIA (50 Columnas) ---
    const wsAs = wb.addWorksheet('ASISTENCIA', { pageSetup: { paperSize: 1, orientation: 'landscape' } });
    wsAs.getColumn(2).width = 35;
    for(let c=3; c<=53; c++) wsAs.getColumn(c).width = 2.2;
    for(let i=0; i < filasMax; i++){
        const r = 4 + i;
        wsAs.getCell(r, 1).value = i + 1;
        wsAs.getCell(r, 2).value = ESTUDIANTES[i]?.nombre || "";
        for(let c=1; c <= 53; c++) wsAs.getCell(r, c).border = borderBlack;
    }

    // --- HOJA 3: BOLETÍN (SOLO NOTA FINAL) ---
    const wsBo = wb.addWorksheet('BOLETINES', { pageSetup: { paperSize: 1 } });
    wsBo.getRow(1).values = ["Nº", "NOMBRE DEL ESTUDIANTE", "NOTA TRIMESTRAL", "OBSERVACIÓN"];
    wsBo.getColumn(2).width = 40;
    wsBo.getColumn(3).width = 20;
    ESTUDIANTES.forEach((e, idx) => {
        const row = wsBo.addRow([idx + 1, e.nombre, e.promedio || 0, (e.promedio >= 51 ? 'APROBADO' : 'REPROBADO')]);
        row.eachCell(c => c.border = borderBlack);
    });

    // --- HOJA 4: CENTRALIZADOR (LIMPIO) ---
    const wsCe = wb.addWorksheet('CENTRALIZADOR', { pageSetup: { paperSize: 1, orientation: 'landscape' } });
    wsCe.getRow(1).values = ["Nº", "ESTUDIANTE", "AREA 1", "AREA 2", "AREA 3", "AREA 4", "PROM. GENERAL"];
    wsCe.getColumn(2).width = 35;
    ESTUDIANTES.forEach((e, idx) => {
        // Promedio decimal inteligente (división entre áreas con nota)
        const row = wsCe.addRow([idx+1, e.nombre, "", "", "", "", "0.00"]);
        row.eachCell(c => c.border = borderBlack);
    });

    // GENERAR ARCHIVO
    try {
        const buffer = await wb.xlsx.writeBuffer();
        const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Registro_Bolivia_2026_${cursoSel}.xlsx`;
        a.click();
        status.innerText = "Excel generado con éxito ✓";
    } catch (err) {
        status.innerText = "Error al generar: " + err.message;
    }
}
</script>
</body>
</html>
