<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exportar Registro Pedagógico 2026</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<style>
:root{--azul:#1a3a6b;--azul2:#2563eb;--verde:#059669;--rojo:#dc2626;--gris:#f1f5f9;--borde:#e2e8f0;--dorado:#b45309}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a3a6b,#1e40af);min-height:100vh;padding:16px;display:flex;align-items:flex-start;justify-content:center}
.card{background:#fff;border-radius:20px;padding:24px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.3);margin-top:10px}
.logo{text-align:center;margin-bottom:16px}
.logo-icon{width:56px;height:56px;background:var(--azul);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 8px}
h1{font-size:17px;font-weight:700;color:var(--azul);text-align:center}
.sub{font-size:11px;color:#64748b;text-align:center;margin-bottom:20px}
.docente-badge{background:#f0f9ff;border:1.5px solid #bae6fd;border-radius:10px;padding:10px 14px;margin-bottom:16px;display:none}
.docente-badge .name{font-size:14px;font-weight:700;color:var(--azul)}
.docente-badge .ue{font-size:11px;color:#64748b;margin-top:2px}
.fg{margin-bottom:12px}
label{display:block;font-size:11px;font-weight:600;color:#64748b;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
select,input{width:100%;padding:9px 12px;border:1.5px solid var(--borde);border-radius:8px;font-size:13px;outline:none;background:#fff;transition:border .15s}
select:focus,input:focus{border-color:var(--azul2)}
select:disabled{background:#f8fafc;color:#94a3b8}
.btn{width:100%;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-p{background:var(--azul2);color:#fff;margin-bottom:8px}
.btn-p:hover{background:var(--azul)}
.btn-g{background:var(--verde);color:#fff;margin-bottom:8px}
.btn-g:hover{opacity:.9}
.btn-g:disabled,.btn-p:disabled{background:#94a3b8;cursor:not-allowed;opacity:.7}
.btn-sm{background:var(--gris);color:#64748b;font-size:12px;padding:8px;margin-top:4px;border-radius:8px;border:none;cursor:pointer;width:100%}
.progress{background:#f8fafc;border-radius:10px;padding:14px;margin-top:12px;border:1px solid var(--borde)}
.prog-title{font-size:12px;font-weight:600;color:var(--azul);margin-bottom:8px}
.prog-bar{height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--azul2),var(--verde));border-radius:4px;transition:width .4s;width:0%}
.prog-msg{font-size:11px;color:#64748b;margin-top:6px}
.log-box{max-height:100px;overflow-y:auto;margin-top:8px;background:#fff;border-radius:6px;padding:8px;border:1px solid var(--borde)}
.log-line{font-size:10px;color:#475569;line-height:1.7;font-family:monospace}
.divider{border:none;border-top:1px solid var(--borde);margin:16px 0}
.back-link{text-align:center;margin-top:12px}
.back-link a{font-size:12px;color:var(--azul2);text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">📊</div>
    <h1>Exportar Registro Oficial</h1>
    <p class="sub">Genera el Excel con formato Ministerio de Educación Bolivia</p>
  </div>

  <div class="docente-badge" id="docente-badge">
    <div class="name" id="badge-nombre">—</div>
    <div class="ue" id="badge-ue">—</div>
  </div>

  <div class="fg" id="fg-email" style="display:none">
    <label>Email del docente</label>
    <input type="email" id="inp-email" placeholder="docente@gmail.com">
    <button class="btn-sm" onclick="buscarDocente()">🔍 Buscar</button>
  </div>

  <div class="fg">
    <label>Curso</label>
    <select id="inp-curso" disabled onchange="filtrarMaterias()">
      <option value="">— Cargando... —</option>
    </select>
  </div>
  <div class="fg">
    <label>Área / Materia</label>
    <select id="inp-materia" disabled>
      <option value="">— Selecciona curso —</option>
    </select>
  </div>
  <div class="fg">
    <label>Trimestre</label>
    <select id="inp-trim">
      <option value="1">1er Trimestre</option>
      <option value="2">2do Trimestre</option>
      <option value="3">3er Trimestre</option>
    </select>
  </div>
  <div class="fg">
    <label>Unidad Educativa</label>
    <input type="text" id="inp-ue" value="Franz Tamayo de Chachacomani">
  </div>

  <hr class="divider">

  <button class="btn btn-g" id="btn-export" onclick="exportarExcel()" disabled>
    📥 Descargar Registro Excel (.xlsx)
  </button>
  <button class="btn btn-sm" onclick="mostrarCampoEmail()">🔄 Cambiar cuenta</button>

  <div class="progress" id="progress" style="display:none">
    <div class="prog-title" id="prog-title">Preparando...</div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
    <div class="prog-msg" id="prog-msg"></div>
    <div class="log-box" id="log-box"></div>
  </div>

  <div class="back-link">
    <a href="javascript:void(0)" onclick="window.close();if(window.history.length>1)window.history.back();">← Volver a la app</a>
    &nbsp;|&nbsp;
    <a href="/">Ir al inicio</a>
  </div>
</div>

<script>
const SUPA_URL='https://dmhkidkzriiorctxmwzv.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtaGtpZGt6cmlpb3JjdHhtd3p2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MDEyNjAsImV4cCI6MjA4OTI3NzI2MH0.XkRFktuBo051m-CLsso4dhPcj2oOzUZEHRLyC4jGMRg';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);

let DOCENTE=null, CURSOS=[];

function log(msg){ const d=document.getElementById('log-box'); d.innerHTML+=`<div class="log-line">${msg}</div>`; d.scrollTop=d.scrollHeight; }
function prog(pct,title,msg){ document.getElementById('prog-fill').style.width=pct+'%'; document.getElementById('prog-title').textContent=title; document.getElementById('prog-msg').textContent=msg||''; }

async function init(){
  const saved=localStorage.getItem('docente');
  if(saved){
    try{
      const doc=JSON.parse(saved);
      DOCENTE=doc;
      mostrarDocente(doc);
      await cargarCursos(doc.id);
      return;
    }catch(e){}
  }
  document.getElementById('fg-email').style.display='block';
}

function mostrarDocente(doc){
  document.getElementById('docente-badge').style.display='block';
  document.getElementById('badge-nombre').textContent='👤 '+doc.nombre;
  document.getElementById('badge-ue').textContent='📍 '+(doc.unidad_educativa||'');
  document.getElementById('inp-ue').value=doc.unidad_educativa||'Franz Tamayo de Chachacomani';
}

function mostrarCampoEmail(){
  document.getElementById('fg-email').style.display='block';
  document.getElementById('inp-email').focus();
}

async function buscarDocente(){
  const email=document.getElementById('inp-email').value.trim().toLowerCase();
  if(!email){ alert('Ingresa el email'); return; }
  const id='D_'+email.replace(/[@.]/g,'_').replace(/[^a-z0-9_]/gi,'');
  const {data}=await sb.from('docentes').select('*').eq('id',id).single();
  if(!data){ alert('Docente no encontrado. Verifica el email.'); return; }
  DOCENTE=data;
  mostrarDocente(data);
  await cargarCursos(id);
  document.getElementById('fg-email').style.display='none';
}

async function cargarCursos(id){
  const {data}=await sb.from('asignaciones').select('*').eq('id_docente',id);
  CURSOS=data||[];
  const sc=document.getElementById('inp-curso');
  sc.disabled=false;
  sc.innerHTML='<option value="">— Selecciona curso —</option>';
  [...new Set(CURSOS.map(c=>c.curso))].sort().forEach(c=>{
    sc.innerHTML+=`<option value="${c}">${c}</option>`;
  });
  document.getElementById('btn-export').disabled=false;
}

function filtrarMaterias(){
  const curso=document.getElementById('inp-curso').value;
  const sm=document.getElementById('inp-materia');
  sm.disabled=!curso;
  sm.innerHTML='<option value="">— Selecciona materia —</option>';
  CURSOS.filter(c=>c.curso===curso).forEach(c=>{
    sm.innerHTML+=`<option value="${c.materia}">${c.materia}</option>`;
  });
  sm.disabled=false;
}

async function exportarExcel(){
  const curso=document.getElementById('inp-curso').value;
  const materia=document.getElementById('inp-materia').value;
  const trim=document.getElementById('inp-trim').value;
  const ue=document.getElementById('inp-ue').value;
  if(!DOCENTE){ alert('No hay docente identificado'); return; }
  if(!curso||!materia){ alert('Selecciona curso y materia'); return; }

  document.getElementById('progress').style.display='block';
  document.getElementById('log-box').innerHTML='';
  prog(5,'Cargando estudiantes...','Conectando con Supabase');

  const id=DOCENTE.id;
  const {data:ests}=await sb.from('estudiantes').select('*').eq('id_docente',id).eq('curso',curso).eq('materia',materia);
  const ESTUDIANTES=(ests||[]).sort((a,b)=>a.nombre.localeCompare(b.nombre));
  log('✓ Estudiantes: '+ESTUDIANTES.length);
  prog(20,'Cargando actividades...','');

  const {data:acts}=await sb.from('actividades').select('*').eq('id_docente',id).eq('curso',curso).eq('materia',materia).eq('trimestre',trim);
  const ACTIVIDADES=acts||[];
  log('✓ Actividades: '+ACTIVIDADES.length);
  prog(40,'Cargando notas...','');

  const {data:notasArr}=await sb.from('notas').select('*').eq('id_docente',id).eq('curso',curso).eq('materia',materia).eq('trimestre',trim);
  const NOTAS={};
  (notasArr||[]).forEach(n=>{ if(!NOTAS[n.id_estudiante]) NOTAS[n.id_estudiante]={}; NOTAS[n.id_estudiante][n.id_actividad]=parseFloat(n.nota); });
  log('✓ Notas: '+(notasArr||[]).length+' registros');
  prog(60,'Cargando autoevaluaciones...','');

  const {data:autoArr}=await sb.from('autoevaluacion').select('*').eq('id_docente',id).eq('curso',curso).eq('materia',materia).eq('trimestre',trim);
  const AUTOEVALS={};
  (autoArr||[]).forEach(a=>{ AUTOEVALS[a.id_estudiante]=parseFloat(a.nota); });
  log('✓ Autoevaluaciones: '+(autoArr||[]).length);
  prog(70,'Cargando asistencia...','');

  const {data:asistArr}=await sb.from('asistencia').select('*').eq('id_docente',id).eq('curso',curso).eq('materia',materia);
  const asistenciaData={};
  (asistArr||[]).forEach(a=>{
    if(!asistenciaData[a.id_estudiante]) asistenciaData[a.id_estudiante]={};
    asistenciaData[a.id_estudiante][a.fecha]=a.estado;
  });
  const todasFechasAsist=[...new Set((asistArr||[]).map(a=>a.fecha))].sort();
  log('✓ Asistencia: '+(asistArr||[]).length+' registros / '+todasFechasAsist.length+' días');
  prog(75,'Generando Excel con formato oficial...','');

  try{
    await generarExcel1T({ESTUDIANTES,ACTIVIDADES,NOTAS,AUTOEVALS,asistenciaData,curso,materia,trim,ue});
    prog(100,'✅ Excel listo','Descarga iniciada');
    log('📁 Archivo generado exitosamente');
  }catch(e){
    prog(0,'❌ Error','');
    log('ERROR: '+e.message);
    console.error(e);
  }
}

function promDim(estId,acts,NOTAS){
  if(!acts.length) return null;
  const hayAlguna=acts.some(a=>{ const n=NOTAS[estId]?.[a.id]; return n!==undefined&&n!==null&&n!==''&&!isNaN(n); });
  if(!hayAlguna) return null;
  const suma=acts.reduce((s,a)=>{
    const n=NOTAS[estId]?.[a.id];
    return s+(n!==undefined&&n!==null&&n!==''&&!isNaN(parseFloat(n))?parseFloat(n):0);
  },0);
  return suma/acts.length;
}

// =====================================================================
// HOJA PRINCIPAL — REGISTRO 1T  (mejoras visuales del código v2)
// =====================================================================
async function generarExcel1T({ESTUDIANTES,ACTIVIDADES,NOTAS,AUTOEVALS,asistenciaData,curso,materia,trim,ue}){
  const wb=new ExcelJS.Workbook();
  wb.creator='Registro Pedagógico 2026';
  const trimNombres={'1':'PRIMER TRIMESTRE','2':'SEGUNDO TRIMESTRE','3':'TERCER TRIMESTRE'};

  const ws=wb.addWorksheet('Registro 1T',{
    pageSetup:{
      paperSize:1,orientation:'landscape',fitToPage:false,scale:65,
      horizontalCentered:true,
      margins:{left:0.2,right:0.2,top:0.31,bottom:0.31,header:0.12,footer:0.12}
    },
    headerFooter:{oddHeader:'',oddFooter:''}
  });

  const C={
    SER_BG:'FFD9E1F2',SAB_BG:'FFE8A9F5',HAC_BG:'FF77EDCE',
    SER_MED:'FFB4C6E7',SAB_MED:'FFD09EF0',HAC_MED:'FF4ADDB8',
    NOMBRE:'FFF3F599',LABEL:'FFF2CF50',TOTAL:'FFFFD966',
    AUTO:'FFFCE4D6',PROM:'FFFFE699',APROBADO:'FFD1FAE5',
    REPROBADO:'FFFEE2E2',HDR_AZUL:'FF1A3A6B',HDR_MED:'FF2563EB',
    GRIS:'FFF1F5F9',WHITE:'FFFFFFFF'
  };

  const serActs=ACTIVIDADES.filter(a=>a.dimension==='SER');
  const saberActs=ACTIVIDADES.filter(a=>a.dimension==='SABER');
  const hacerActs=ACTIVIDADES.filter(a=>a.dimension==='HACER');

  const nSER=Math.max(4,serActs.length);
  const nSAB=Math.max(9,saberActs.length);
  const nHAC=Math.max(9,hacerActs.length);
  const wSER=nSER<=4?7:nSER<=6?6:nSER<=9?5:4;
  const wSAB=nSAB<=9?6:nSAB<=12?5:nSAB<=15?4:3.5;
  const wHAC=nHAC<=9?6:nHAC<=12?5:nHAC<=15?4:3.5;

  const C1=1,C_NOM_S=2,C_NOM_E=4;
  const C_SER_S=5,C_SER_E=4+nSER;
  const C_PSER=C_SER_E+1;
  const C_SAB_S=C_PSER+1,C_SAB_E=C_PSER+nSAB;
  const C_PSAB=C_SAB_E+1;
  const C_HAC_S=C_PSAB+1,C_HAC_E=C_PSAB+nHAC;
  const C_PHAC=C_HAC_E+1;
  const C_TOTAL=C_PHAC+1,C_AUTO=C_TOTAL+1,C_PROM=C_AUTO+1,C_EST=C_PROM+1;
  const NCOLS=C_EST;

  ws.views=[{state:'frozen',xSplit:0,ySplit:7}];
  ws.pageSetup.printTitlesRow='1:7';

  ws.getColumn(C1).width=4;
  ws.getColumn(C_NOM_S).width=30;
  for(let c=C_NOM_S+1;c<=C_NOM_E;c++) ws.getColumn(c).width=2;
  for(let c=C_SER_S;c<=C_SER_E;c++) ws.getColumn(c).width=wSER;
  ws.getColumn(C_PSER).width=6.5;
  for(let c=C_SAB_S;c<=C_SAB_E;c++) ws.getColumn(c).width=wSAB;
  ws.getColumn(C_PSAB).width=6.5;
  for(let c=C_HAC_S;c<=C_HAC_E;c++) ws.getColumn(c).width=wHAC;
  ws.getColumn(C_PHAC).width=6.5;
  ws.getColumn(C_TOTAL).width=6.5;
  ws.getColumn(C_AUTO).width=6;
  ws.getColumn(C_PROM).width=6.5;
  ws.getColumn(C_EST).width=10;

  const border={style:'thin',color:{argb:'FF000000'}};
  const allBorder={top:border,left:border,bottom:border,right:border};
  function fill(argb){return{type:'pattern',pattern:'solid',fgColor:{argb}};}
  function font(bold,size,color='FF000000'){return{bold,size,name:'Calibri',color:{argb:color}};}
  function align(h,v,rot,wrap){return{horizontal:h,vertical:v,textRotation:rot||0,wrapText:!!wrap};}
  function sc(r,c,val,bg,fnt,aln,brd=true){
    const cell=ws.getCell(r,c);
    if(val!==null&&val!==undefined) cell.value=val;
    if(bg) cell.fill=fill(bg);
    if(fnt) cell.font=fnt;
    if(aln) cell.alignment=aln;
    if(brd) cell.border=allBorder;
    return cell;
  }
  function merge(r,c1,c2,val,bg,fnt,aln){
    if(c1<c2){try{ws.mergeCells(r,c1,r,c2);}catch(e){}}
    return sc(r,c1,val,bg,fnt,aln);
  }

  // ===== FILAS DE ENCABEZADO =====
  ws.getRow(1).height=22;
  merge(1,1,NCOLS,'UNIDAD EDUCATIVA: '+ue.toUpperCase(),
    C.HDR_AZUL,font(true,14,'FFFFFFFF'),align('center','middle',0,false));

  ws.getRow(2).height=20;
  merge(2,1,NCOLS,'REGISTRO DE EVALUACIÓN — GESTIÓN 2026',
    C.HDR_MED,font(false,13,'FFFFFFFF'),align('center','middle',0,false));

  ws.getRow(3).height=20;
  merge(3,C1,C_NOM_E,'MAESTRA(O):',C.LABEL,font(true,11),align('right','middle'));
  merge(3,C_SER_S,C_PHAC,DOCENTE.nombre,C.WHITE,font(false,11),align('left','middle'));
  sc(3,C_TOTAL,'CURSO:',C.LABEL,font(true,10),align('center','middle'));
  merge(3,C_AUTO,NCOLS,curso,C.WHITE,font(true,12),align('center','middle'));

  ws.getRow(4).height=20;
  merge(4,C1,C_NOM_E,'ASIGNATURA:',null,font(true,11),align('right','middle'));
  merge(4,C_SER_S,C_EST,materia.toUpperCase(),C.WHITE,font(true,12),align('left','middle'));

  // ===== FILAS 5 Y 6: combinación vertical para títulos finales (mejora v2) =====
  ws.getRow(5).height=20;
  ws.getRow(6).height=20;
  merge(5,C1,C_NOM_E,'',C.GRIS,null,null);
  merge(6,C1,C_NOM_E,'Valoración del Docente','FFE2EFDA',font(false,9),align('center','middle'));
  merge(5,C_SER_S,C_PHAC,trimNombres[trim],C.SER_BG,font(true,11),align('center','middle'));
  merge(6,C_SER_S,C_PSER,'SER — 10 pts',C.SER_BG,font(true,10),align('center','middle'));
  merge(6,C_SAB_S,C_PSAB,'SABER — 45 pts',C.SAB_BG,font(true,10),align('center','middle'));
  merge(6,C_HAC_S,C_PHAC,'HACER — 40 pts',C.HAC_BG,font(true,10),align('center','middle'));

  // Merge vertical filas 5-6 para columnas finales
  [{col:C_TOTAL,txt:'EVAL.\nTOTAL',color:C.TOTAL},
   {col:C_AUTO, txt:'AUTO\nEVAL.', color:C.AUTO},
   {col:C_PROM, txt:'PROM.\nFINAL',color:C.PROM},
   {col:C_EST,  txt:'ESTADO',      color:'FFE2EFDA'}
  ].forEach(t=>{
    try{ws.mergeCells(5,t.col,6,t.col);}catch(e){}
    const cell=ws.getCell(5,t.col);
    cell.value=t.txt;
    cell.fill=fill(t.color);
    cell.font=font(true,8.5);
    cell.alignment=align('center','middle',0,true);
    cell.border=allBorder;
  });

  // ===== FILA 7: ENCABEZADOS ACTIVIDADES VERTICALES (mejora v2) =====
  ws.getRow(7).height=145;
  merge(7,C1,C_NOM_E,'Nº  |  APELLIDOS Y NOMBRES',C.NOMBRE,font(true,13),align('center','bottom',0,true));

  for(let i=0;i<nSER;i++){
    const act=serActs[i];
    sc(7,C_SER_S+i,act?act.nombre_actividad:'',C.SER_BG,font(false,8.5),align('center','bottom',90,true));
  }
  sc(7,C_PSER,'PROMEDIO\nSER',C.SER_MED,font(true,12),align('center','bottom',90,true));

  for(let i=0;i<nSAB;i++){
    const act=saberActs[i];
    sc(7,C_SAB_S+i,act?act.nombre_actividad:'',C.SAB_BG,font(false,8.5),align('center','bottom',90,true));
  }
  sc(7,C_PSAB,'PROMEDIO\nSABER',C.SAB_MED,font(true,12),align('center','bottom',90,true));

  for(let i=0;i<nHAC;i++){
    const act=hacerActs[i];
    sc(7,C_HAC_S+i,act?act.nombre_actividad:'',C.HAC_BG,font(false,8.5),align('center','bottom',90,true));
  }
  sc(7,C_PHAC,'PROMEDIO\nHACER',C.HAC_MED,font(true,12),align('center','bottom',90,true));
  sc(7,C_TOTAL,'VALORACIÓN\nTOTAL',C.TOTAL,font(true,12),align('center','bottom',90,true));
  sc(7,C_AUTO,'AUTOEVALUACIÓN (5)',C.AUTO,font(true,12),align('center','bottom',90,true));
  sc(7,C_PROM,'PROMEDIO\nTRIMESTRAL',C.PROM,font(true,12),align('center','bottom',90,true));
  sc(7,C_EST,'ESTADO DEL\nESTUDIANTE','FFE2EFDA',font(true,12),align('center','bottom',90,true));

  // ===== FILAS DE ESTUDIANTES =====
  const MIN_FILAS=Math.max(25,ESTUDIANTES.length);
  let aprobados=0;
  for(let i=0;i<MIN_FILAS;i++){
    const e=ESTUDIANTES[i]||null;
    const row=8+i;
    ws.getRow(row).height=17;
    const rowBg=i%2===0?C.WHITE:C.GRIS;
    sc(row,C1,e?i+1:'',rowBg,font(true,10),align('center','middle'));
    merge(row,C_NOM_S,C_NOM_E,e?e.nombre:'',rowBg,font(true,10),align('left','middle'));

    for(let j=0;j<nSER;j++){
      const act=serActs[j];
      const n=e&&act?NOTAS[e.id]?.[act.id]:undefined;
      sc(row,C_SER_S+j,n!==undefined&&n!==null?n:'',i%2===0?'FFEFF6FF':'FFE1EFFE',font(false,11),align('center','middle',0,false));
    }
    const pSer=e?promDim(e.id,serActs,NOTAS):null;
    sc(row,C_PSER,pSer!==null?Math.round(pSer):'',C.SER_MED,font(true,12),align('center','middle'));

    for(let j=0;j<nSAB;j++){
      const act=saberActs[j];
      const n=e&&act?NOTAS[e.id]?.[act.id]:undefined;
      sc(row,C_SAB_S+j,n!==undefined&&n!==null?n:'',i%2===0?'FFF5F3FF':'FFEDE9FE',font(false,11),align('center','middle',0,false));
    }
    const pSab=e?promDim(e.id,saberActs,NOTAS):null;
    const pSabConv=pSab!==null?Math.round(pSab*0.45):null;
    sc(row,C_PSAB,pSabConv!==null?pSabConv:'',C.SAB_MED,font(true,12),align('center','middle'));

    for(let j=0;j<nHAC;j++){
      const act=hacerActs[j];
      const n=e&&act?NOTAS[e.id]?.[act.id]:undefined;
      sc(row,C_HAC_S+j,n!==undefined&&n!==null?n:'',i%2===0?'FFF0FDF4':'FFE6FAF2',font(false,11),align('center','middle',0,false));
    }
    const pHac=e?promDim(e.id,hacerActs,NOTAS):null;
    const pHacConv=pHac!==null?Math.round(pHac*0.40):null;
    sc(row,C_PHAC,pHacConv!==null?pHacConv:'',C.HAC_MED,font(true,12),align('center','middle'));

    const total=e&&(pSer!==null||pSabConv!==null||pHacConv!==null)?
      Math.round((pSer||0)+(pSabConv||0)+(pHacConv||0)):null;
    sc(row,C_TOTAL,total!==null?total:'',C.TOTAL,font(true,12),align('center','middle'));

    const auto=e&&AUTOEVALS[e.id]!==undefined?AUTOEVALS[e.id]:null;
    sc(row,C_AUTO,auto!==null?auto:'',C.AUTO,font(true,11),align('center','middle'));

    const promFinal=total!==null?Math.round(total+(auto||0)):null;
    sc(row,C_PROM,promFinal!==null?promFinal:'',C.PROM,font(true,12),align('center','middle'));

    let estado='',estBg=C.WHITE,estColor='FF000000';
    if(promFinal!==null){
      if(promFinal>=51){estado='APROBADO';estBg=C.APROBADO;estColor='FF065F46';aprobados++;}
      else{estado='REPROBADO';estBg=C.REPROBADO;estColor='FF991B1B';}
    }
    sc(row,C_EST,estado,estBg,font(true,9,estColor),align('center','middle'));
  }

  // ===== ESTADÍSTICA (mejora v2) =====
  const rowRes=8+MIN_FILAS;
  const reprobados1T=ESTUDIANTES.length-aprobados;
  const pctApro=ESTUDIANTES.length?Math.round(aprobados/ESTUDIANTES.length*100):0;
  const pctRepr=ESTUDIANTES.length?Math.round(reprobados1T/ESTUDIANTES.length*100):0;
  const resData=[
    ['TOTAL ESTUDIANTES',ESTUDIANTES.length],
    ['EFECTIVOS',ESTUDIANTES.length],
    ['APROBADOS',aprobados],
    ['REPROBADOS',reprobados1T],
    ['RETIRADOS',0],
    ['PORCENTAJE DE APROBADOS',pctApro+'%'],
    ['PORCENTAJE DE REPROBADOS',pctRepr+'%']
  ];
  ws.getRow(rowRes).height=18;
  merge(rowRes,Math.floor(NCOLS/2),NCOLS-1,'ESTADÍSTICA','FF1F3D6A',font(true,9,'FFFFFFFF'),align('center','middle'));
  sc(rowRes,NCOLS,(parseInt(trim)+1)+'DO. TRIM.','FF1F3D6A',font(true,9,'FFFFFFFF'),align('center','middle'));
  resData.forEach((fila,idx)=>{
    const r=rowRes+1+idx;
    ws.getRow(r).height=15;
    merge(r,Math.floor(NCOLS/2),NCOLS-1,fila[0],'FFFFFFFF',font(false,8,'FF334155'),align('left','middle'));
    sc(r,NCOLS,fila[1],'FFFFFFFF',font(true,10,'FF1F3D6A'),align('center','middle'));
  });

  // ===== FIRMA =====
  const rowFinal=rowRes+resData.length+3;
  ws.getRow(rowFinal).height=45;
  merge(rowFinal,1,5,'_______________________________','FFFFFFFF',font(false,10),align('center','bottom'));
  const fechaHoy=new Intl.DateTimeFormat('es-ES',{dateStyle:'full'}).format(new Date());
  merge(rowFinal,Math.floor(NCOLS/2),NCOLS,'FECHA: Lugar, '+fechaHoy,'FFFFFFFF',font(false,10),align('right','bottom'));
  ws.getRow(rowFinal+1).height=15;
  merge(rowFinal+1,1,5,'FIRMA / SELLO','FFFFFFFF',font(false,8,'FF64748B'),align('center','top'));

  function numToCol(n){let s='';while(n>0){s=String.fromCharCode(65+(n-1)%26)+s;n=Math.floor((n-1)/26);}return s;}
  const lastRowPrint=rowFinal+2;
  ws.pageSetup.printArea='A1:'+numToCol(NCOLS)+lastRowPrint;
  ws.pageSetup.showGridLines=false;
  ws.pageSetup.horizontalCentered=true;
  ws.pageSetup.fitToPage=true;
  ws.pageSetup.fitToWidth=1;
  ws.pageSetup.fitToHeight=0;

  // ===== LLAMAR HOJAS ADICIONALES (estructura del código v1 — CORRECTA) =====
  await generarAS1({wb,ESTUDIANTES,asistenciaData,curso,materia,trim,ue,DOCENTE});
  log('✓ Hoja AS.1 generada');

  await generarBOL({wb,ESTUDIANTES,NOTAS,AUTOEVALS,ACTIVIDADES,asistenciaData,curso,materia,trim,ue,DOCENTE});
  log('✓ Hoja 1.BOL generada');

  await generarCentralizador({wb,ESTUDIANTES,NOTAS,AUTOEVALS,ACTIVIDADES,curso,materia,trim,ue,DOCENTE});
  log('✓ Hoja Centralizador generada');

  // ===== DESCARGAR =====
  log('📐 Generando archivo...');
  const buffer=await wb.xlsx.writeBuffer();
  const blob=new Blob([buffer],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`Registro_${curso}_${materia.replace(/[/:,\s]/g,'-')}_Trim${trim}_2026.xlsx`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  log('📁 Descarga completada');
}

// =====================================================================
// HOJA AS.1 — CUADRO DE ASISTENCIA (CORRECCIÓN DEFINITIVA)
// =====================================================================
async function generarAS1({wb,ESTUDIANTES,asistenciaData,curso,materia,trim,ue,DOCENTE}){
  function colLetra(n){let s='';while(n>0){s=String.fromCharCode(65+(n-1)%26)+s;n=Math.floor((n-1)/26);}return s;}
  const trimNom={'1':'1ER. TRIMESTRE','2':'2DO. TRIMESTRE','3':'3ER. TRIMESTRE'};
  const ws=wb.addWorksheet('AS.1');
  
  // Configuración de página
  ws.pageSetup.orientation='landscape';
  ws.pageSetup.paperSize=1;
  ws.pageSetup.scale=75;
  ws.pageSetup.margins={left:0.2,right:0.2,top:0.3,bottom:0.3,header:0,footer:0};

  // Definición de Colores (Para evitar errores de "not defined")
  const AZ='FF1A3A6B', AM='FF2563EB', LA='FFF2CF50', PR='FFFFC000',
        LC='FF92D050', AT='FFFDE9D9', FA='FFFFC7CE', WH='FFFFFFFF', GR='FFF1F5F9';
  
  const CN=1, NS=2, NE=3, DS=4, DE=39, CP=40, CL=41, CA=42, CF=43, CT=44;

  // Funciones de formato (Asegurando compatibilidad con tu sistema)
  const brd={style:'thin',color:{argb:'FF000000'}};
  const allB={top:brd,left:brd,bottom:brd,right:brd};
  function fill(a){return{type:'pattern',pattern:'solid',fgColor:{argb:a}};}
  function fnt(bold,size,color='FF000000'){return{bold,size,name:'Calibri',color:{argb:color}};}
  function aln(h,v,rot,wrap){return{horizontal:h,vertical:v,textRotation:rot||0,wrapText:!!wrap};}
  
  function sc(r,col,val,bg,fn,al){
    const cell=ws.getCell(r,col);
    if(val!==null && val!==undefined) cell.value=val;
    if(bg) cell.fill=fill(bg);
    if(fn) cell.font=fn;
    if(al) cell.alignment=al;
    cell.border=allB;
    return cell;
  }
  
  function mg(r,c1,c2,val,bg,fn,al){
    if(c1<c2){try{ws.mergeCells(r,c1,r,c2);}catch(e){}}
    return sc(r,c1,val,bg,fn,al);
  }

  // Anchos de columna
  ws.getColumn(CN).width=3.5;
  ws.getColumn(NS).width=17;
  ws.getColumn(NE).width=15;
  for(let i=DS;i<=DE;i++) ws.getColumn(i).width=2.8;
  ws.getColumn(CP).width=4; ws.getColumn(CL).width=4;
  ws.getColumn(CA).width=4; ws.getColumn(CF).width=4; ws.getColumn(CT).width=6.5;

  // ===== ENCABEZADO INSTITUCIONAL =====
  ws.getRow(1).height=20;
  mg(1,CN,CT,'UNIDAD EDUCATIVA TÉCNICO HUMANÍSTICA: '+ue.toUpperCase(), AZ, fnt(true,11,WH), aln('center','middle'));

  ws.getRow(2).height=18;
  mg(2,CN,CT,'CUADRO DE ASISTENCIA — GESTIÓN 2026', AM, fnt(false,12,WH), aln('center','middle'));

// ===== FILA 3: CORRECCIÓN DE POSICIÓN PARA QUE "CURSO:" SE VEA BIEN =====
  ws.getRow(3).height = 22;
  // 1. Etiqueta MAESTRA(O) (Columnas 1 a 3)
  mg(3, CN, 3, 'MAESTRA(O):', 'FFF1F5F9', fnt(true, 9), aln('right', 'middle'));
  // 2. Nombre del Docente (Columnas 4 a 30) -> Le damos bastante espacio pero sin pasarnos
  mg(3, 4, 30, DOCENTE.nombre, 'FFFFFFFF', fnt(false, 10), aln('left', 'middle'));
  // 3. Etiqueta CURSO (Columnas 31 a 33) -> La movemos un poco a la derecha para que no choque
  mg(3, 31, 33, 'CURSO:', 'FFF1F5F9', fnt(true, 10), aln('center', 'middle'));
  // 4. Dato del CURSO (Desde Columna 34 hasta el final CT)
  mg(3, 34, CT, curso, 'FFFFFFFF', fnt(true, 11), aln('center', 'middle'));

  ws.getRow(4).height=18;
  mg(4,CN,3,'ASIGNATURA:', GR, fnt(true,9), aln('right','middle'));
  mg(4,4,CT, materia.toUpperCase(), WH, fnt(false,10), aln('left','middle'));

  ws.getRow(5).height=5;

  // ===== ENCABEZADOS DE TABLA (FILA 6 AL 8 COMBINADOS) =====
  ws.getRow(6).height=20;
  ws.getRow(7).height=40;
  ws.getRow(8).height=40;

  ws.mergeCells(6,CN,8,CN); sc(6,CN,'N°', AZ, fnt(true,9,WH), aln('center','middle'));
  ws.mergeCells(6,NS,8,NE); sc(6,NS,'APELLIDOS Y NOMBRES', AZ, fnt(true,10,WH), aln('center','middle'));

  const todasFechas=Object.keys(asistenciaData).length>0 ? [...new Set(Object.values(asistenciaData).flatMap(d=>Object.keys(d)))].sort() : [];
  const fechas=todasFechas.slice(0,36);
  mg(6,DS,DE,'ASISTENCIA — '+trimNom[trim], AM, fnt(true,10,WH), aln('center','middle'));

  // Fechas Verticales Combinadas
  fechas.forEach((f,i)=>{
    const p=f.split('-');
    const lbl=p.length===3?p[2]+'/'+p[1]:f;
    const col=DS+i;
    ws.mergeCells(7,col,8,col);
    sc(7,col,lbl, i%2===0?'FFD9E1F2':WH, fnt(false,9), aln('center','middle',90));
  });
  for(let i=fechas.length;i<(DE-DS+1);i++){
    ws.mergeCells(7,DS+i,8,DS+i);
    sc(7,DS+i,'',WH,null,null);
  }

  // Leyendas P, L, A, F y Total
  const leyendas=[
    {c:CP, t:'P - PRESENTE', b:LA}, {c:CL, t:'L - LICENCIA', b:LC},
    {c:CA, t:'A - ATRASO',   b:AT}, {c:CF, t:'F - FALTA',    b:FA}
  ];
  leyendas.forEach(l=>{
    ws.mergeCells(6,l.c,8,l.c);
    sc(6,l.c,l.t, l.b, fnt(true,8), aln('center','middle',90,true));
  });
  ws.mergeCells(6,CT,8,CT);
  sc(6,CT,'TOTAL\nDÍAS', AZ, fnt(true,8,WH), aln('center','middle',0,true));

  // ===== LISTA DE ESTUDIANTES =====
  const MIN_AS1=Math.max(35,ESTUDIANTES.length);
  for(let idx=0;idx<MIN_AS1;idx++){
    const e=ESTUDIANTES[idx]||null;
    const row=9+idx;
    ws.getRow(row).height=17.4;
    const rowBg=idx%2===0?WH:GR;

    sc(row,CN,e?idx+1:'',rowBg,fnt(true,9),aln('center','middle'));
    mg(row,NS,NE,e?e.nombre:'',rowBg,fnt(false,9),aln('left','middle'));

    if(e){
      let cP=0, cL=0, cA=0, cF=0;
      fechas.forEach((f,j)=>{
        const est=(asistenciaData[e.id]&&asistenciaData[e.id][f])||'';
        if(est==='P') cP++; if(est==='L') cL++; if(est==='A') cA++; if(est==='F') cF++;
        const bgM={'P':'FFE8F5E9','L':'FFF1F8E9','A':'FFFFF9E6','F':'FFFCE4EC'};
        const txM={'P':'FF2E7D32','L':'FF33691E','A':'FFE65100','F':'FFC62828'};
        sc(row,DS+j,est,est?bgM[est]:rowBg,fnt(true,8,est?txM[est]:'FF333333'),aln('center','middle'));
      });
      for(let j=fechas.length;j<(DE-DS+1);j++) sc(row,DS+j,'',rowBg,null,null);
      
      sc(row,CP,cP||'',LA,fnt(true,10),aln('center','middle'));
      sc(row,CL,cL||'',LC,fnt(true,10),aln('center','middle'));
      sc(row,CA,cA||'',AT,fnt(true,10),aln('center','middle'));
      sc(row,CF,cF||'',FA,fnt(true,10),aln('center','middle'));
      sc(row,CT,(cP+cL+cA+cF)||'',AZ,fnt(true,10,WH),aln('center','middle'));
    } else {
      for(let col=DS; col<=CT; col++) sc(row,col,'',rowBg,null,null);
    }
  }

  // ===== TOTALES POR DÍA =====
  const rt=9+MIN_AS1;
  
  ws.getRow(rt).height=18;
  mg(rt,CN,NE,'TOTALES POR DÍA', AZ, fnt(true,9,WH), aln('center','middle'));
  fechas.forEach((f,j)=>{
    const cPcol=ESTUDIANTES.filter(e=>(asistenciaData[e.id]&&asistenciaData[e.id][f])==='P').length;
    sc(rt,DS+j,cPcol||'','FFD9E1F2',fnt(true,8,AZ),aln('center','middle'));
  });
  for(let j=fechas.length;j<(DE-DS+1);j++) sc(rt,DS+j,'',GR,null,null);

  // ===== FIRMA Y FECHA (EN UNA SOLA LÍNEA) =====
  const rowFirma=rt+3;
  ws.getRow(rowFirma).height=45;
  mg(rowFirma, 1, 6, '_______________________________', WH, fnt(false, 10), aln('center', 'bottom'));
  const fechaHoy=new Intl.DateTimeFormat('es-ES',{dateStyle:'full'}).format(new Date());
  mg(rowFirma, 20, CT, 'FECHA: Lugar, '+ fechaHoy, WH, fnt(false, 10), aln('right', 'bottom'));
  
  ws.getRow(rowFirma+1).height=15;
  mg(rowFirma+1, 1, 6, 'FIRMA DEL MAESTRO(A)', WH, fnt(false, 8, 'FF64748B'), aln('center', 'top'));

  // Configuración de Impresión
  ws.pageSetup.printArea='A1:'+colLetra(CT)+(rowFirma+2);
  ws.pageSetup.showGridLines=false;
  ws.pageSetup.printTitlesRow='1:8';
}

async function generarBOL({wb,ESTUDIANTES,NOTAS,AUTOEVALS,ACTIVIDADES,asistenciaData,curso,materia,trim,ue,DOCENTE}){
  function colL(n){let s='';while(n>0){s=String.fromCharCode(65+(n-1)%26)+s;n=Math.floor((n-1)/26);}return s;}
  const trimNom={'1':'PRIMER TRIMESTRE','2':'SEGUNDO TRIMESTRE','3':'TERCER TRIMESTRE'};
  const ws=wb.addWorksheet('1.BOL');
  ws.pageSetup.orientation='portrait';
  ws.pageSetup.paperSize=1;
  ws.pageSetup.scale=69;
  ws.pageSetup.fitToPage=false;
  ws.pageSetup.margins={left:0.39,right:0,top:0.59,bottom:0,header:0.12,footer:0.12};
  ws.headerFooter={oddHeader:'',oddFooter:''};

  const brd={style:'thin',color:{argb:'FF000000'}};
  const allB={top:brd,left:brd,bottom:brd,right:brd};
  function fill(a){return{type:'pattern',pattern:'solid',fgColor:{argb:a}};}
  function fnt(bold,size,color='FF000000'){return{bold,size,name:'Calibri',color:{argb:color}};}
  function aln(h,v,rot,wrap){return{horizontal:h,vertical:v,textRotation:rot||0,wrapText:!!wrap};}
  function sc(r,col,val,bg,fn,al,borde=true){
    const cell=ws.getCell(r,col);
    if(val!==null&&val!==undefined)cell.value=val;
    if(bg)cell.fill=fill(bg);
    if(fn)cell.font=fn;
    if(al)cell.alignment=al;
    if(borde)cell.border=allB;
    return cell;
  }
  function mg(r,c1,c2,val,bg,fn,al){
    if(c1<c2){try{ws.mergeCells(r,c1,r,c2);}catch(e){}}
    return sc(r,c1,val,bg,fn,al);
  }
  function mgBlock(r1,r2,c1,c2,val,bg,fn,al){
    if(r1!==r2||c1!==c2){try{ws.mergeCells(r1,c1,r2,c2);}catch(e){}}
    const cell=ws.getCell(r1,c1);
    if(val!==null&&val!==undefined)cell.value=val;
    if(bg)cell.fill=fill(bg);
    if(fn)cell.font=fn;
    if(al)cell.alignment=al;
    cell.border=allB;
    return cell;
  }
  
// Función para convertir números a palabras (1-100)
  function numeroALiteral(n) {
    if (n === null || n === undefined || isNaN(n)) return '';
    if (n === 0) return 'CERO';
    if (n === 100) return 'CIEN';
    const unidades = ['', 'UN', 'DOS', 'TRES', 'CUATRO', 'CINCO', 'SEIS', 'SIETE', 'OCHO', 'NUEVE'];
    const especiales = ['DIEZ', 'ONCE', 'DOCE', 'TRECE', 'CATORCE', 'QUINCE', 'DIECISEIS', 'DIECISIETE', 'DIECIOCHO', 'DIECINUEVE'];
    const decenas = ['', 'DIEZ', 'VEINTE', 'TREINTA', 'CUARENTA', 'CINCUENTA', 'SESENTA', 'SETENTA', 'OCHENTA', 'NOVENTA'];

    if (n < 10) return unidades[n];
    if (n >= 10 && n < 20) return especiales[n - 10];
    if (n === 20) return 'VEINTE';
    if (n > 20 && n < 30) return 'VEINTI' + unidades[n - 20];
    
    let u = n % 10;
    let d = Math.floor(n / 10);
    if (u === 0) return decenas[d];
    return decenas[d] + ' Y ' + unidades[u];
  }
  const AZ='FF1A3A6B',AM='FF2563EB';
  const SER_BG='FFD9E1F2',SAB_BG='FFE8A9F5',HAC_BG='FF77EDCE';
  const LABEL='FFF2CF50',TOTAL='FFFFD966',AUTO='FFFCE4D6',PROM='FFFFE699';
  const APROB='FFD1FAE5',REPRO='FFFEE2E2',WH='FFFFFFFF',GR='FFF1F5F9';
  const AMARILLO='FFFFC000',VERDE='FF46E281';

  const serActs=ACTIVIDADES.filter(a=>a.dimension==='SER'&&String(a.trimestre)===String(trim));
  const sabActs=ACTIVIDADES.filter(a=>a.dimension==='SABER'&&String(a.trimestre)===String(trim));
  const hacActs=ACTIVIDADES.filter(a=>a.dimension==='HACER'&&String(a.trimestre)===String(trim));

  const CA=1,CNS=2,CNE=3,C_SER=4,C_SAB=5,C_HAC=6;
  const C_TOT=7,C_AUTO=8,C_PROM=9,C_PF=10,C_LIT=11,C_OBS=12;
  const NCOLS=C_OBS;

 ws.getColumn(CA).width = 4;
  ws.getColumn(CNS).width = 32; // Más espacio para nombres
  ws.getColumn(CNE).width = 1;  // Columna pequeña de apoyo
  ws.getColumn(C_SER).width = 7;
  ws.getColumn(C_SAB).width = 7;
  ws.getColumn(C_HAC).width = 7;
  ws.getColumn(C_TOT).width = 8;
  ws.getColumn(C_AUTO).width = 8;
  ws.getColumn(C_PROM).width = 8;
  ws.getColumn(C_PF).width = 8;
  ws.getColumn(C_LIT).width = 22; // Espacio para el texto literal
  ws.getColumn(C_OBS).width = 14;

  // ===== ENCABEZADO REFORMULADO (REEMPLAZAR DESDE FILA 1 HASTA 7) =====
  // Fila 1: Nombre de la Institución
  ws.getRow(1).height = 20;
  mg(1, CA, NCOLS, 'UNIDAD EDUCATIVA "' + ue.toUpperCase() + '"', AZ, fnt(true, 12, WH), aln('center', 'middle'));
  // Fila 2: Separador
  ws.getRow(2).height = 1;
  // Fila 3: Título y Cuadro de Trimestre (1T, 2T, 3T)
  ws.getRow(3).height = 30;
  mg(3, CA, C_PROM, 'CUADRO DE CALIFICACIONES', AM, fnt(true, 16, 'FFFFFF'), aln('center', 'middle'));
  // Cuadrito a la derecha
  mgBlock(3, 3, C_PF, NCOLS, trim === '1' ? '1T' : trim === '2' ? '2T' : '3T', AM, fnt(true, 16, 'FFFFFF'), aln('center', 'middle'));
 // Fila 4: Nombre del Trimestre en Grande
  ws.getRow(4).height = 28;
  mg(4, CA, NCOLS, trimNom[trim].toUpperCase(), WH, fnt(true, 14, 'FF833C00'), aln('center', 'middle'));
 // Fila 5 y 6: Maestro y Curso
 ws.getRow(5).height = 16; ws.getRow(6).height = 16;
 // Maestro: Combinamos columnas 1 y 2 para que quepa la palabra completa

        return suma/acts.length;
      }
      const pSer=prom(serActs),pSab=prom(sabActs),pHac=prom(hacActs);

      sc(row,C_OBS,estado,estBg,fnt(true,7,promFinal>=51?'FF065F46':'FF991B1B'),aln('center','middle',0,true));
    } else {

    const pS=pr(serActs),pB=pr(sabActs),pH=pr(hacActs);
    const auto=AUTOEVALS[e.id]||0;
    const tot=Math.round((pS||0)+(pB!==null?Math.round(pB*0.45):0)+(pH!==null?Math.round(pH*0.40):0)+auto);
    return tot>=51;
  }).length;
  const reprobados=totalEst-aprobados;
  const statData=[
    ['ESTADISTICA',''],['TOTAL ESTUDIANTES',totalEst],['EFECTIVOS',totalEst],
    ['APROBADOS',aprobados],['REPROBADOS',reprobados],['RETIRADOS',0]
  ];
  statData.forEach((fila,idx)=>{
    const r=rowStat+idx;
    ws.getRow(r).height=13;
    mg(r,Math.floor(NCOLS/2),C_LIT-1,fila[0],idx===0?AZ:GR,fnt(idx===0,9,idx===0?'FFFFFFFF':'FF374151'),aln('left','middle'));
    sc(r,C_LIT,fila[1],idx===0?AZ:WH,fnt(true,10,idx===0?'FFFFFFFF':'FF1A3A6B'),aln('center','middle'));
  });
  // ===== FIRMA Y FECHA (EN UNA SOLA LÍNEA) =====
// ===== FIRMA Y FECHA (EN UNA SOLA LÍNEA) =====
const rowFirma = rowStat + statData.length + 1;

ws.getRow(rowFirma).height = 45;
mg(rowFirma, 1, 6, '_______________________________', WH, fnt(false, 10), aln('center', 'bottom'));
const fechaHoy = new Intl.DateTimeFormat('es-ES', {dateStyle: 'full'}).format(new Date());
mg(rowFirma, 7, NCOLS, 'FECHA: Lugar, ' + fechaHoy, WH, fnt(false, 10), aln('right', 'bottom'));

ws.getRow(rowFirma + 1).height = 15;
mg(rowFirma + 1, 1, 6, 'FIRMA DEL MAESTRO(A)', WH, fnt(false, 8, 'FF64748B'), aln('center', 'top'));

// Configuración de Impresión
ws.pageSetup.printArea = 'A1:' + colL(NCOLS) + (rowFirma + 2);
ws.pageSetup.showGridLines = false;
ws.pageSetup.printTitlesRow = '1:10';
}


// =====================================================================
// HOJA CENTRALIZADOR
// =====================================================================
async function generarCentralizador({wb,ESTUDIANTES,NOTAS,AUTOEVALS,ACTIVIDADES,curso,materia,trim,ue,DOCENTE}){
  function colL(n){let s='';while(n>0){s=String.fromCharCode(65+(n-1)%26)+s;n=Math.floor((n-1)/26);}return s;}
  const trimNom={'1':'PRIMER TRIMESTRE','2':'SEGUNDO TRIMESTRE','3':'TERCER TRIMESTRE'};
  const ws=wb.addWorksheet('Cent.'+trim+'er TRIM');
  ws.pageSetup.orientation='landscape';ws.pageSetup.paperSize=1;ws.pageSetup.scale=80;
  ws.pageSetup.fitToPage=false;
  ws.pageSetup.margins={left:0.2,right:0,top:0.39,bottom:0,header:0.12,footer:0.12};
  ws.headerFooter={oddHeader:'',oddFooter:''};

  const brd={style:'thin',color:{argb:'FF000000'}};
  const allB={top:brd,left:brd,bottom:brd,right:brd};
  function fill(a){return{type:'pattern',pattern:'solid',fgColor:{argb:a}};}
  function fnt(bold,size,color='FF000000'){return{bold,size,name:'Calibri',color:{argb:color}};}
  function aln(h,v,rot,wrap){return{horizontal:h,vertical:v,textRotation:rot||0,wrapText:!!wrap};}
  function sc(r,col,val,bg,fn,al,borde=true){
    const cell=ws.getCell(r,col);
    if(val!==null&&val!==undefined)cell.value=val;
    if(bg)cell.fill=fill(bg);if(fn)cell.font=fn;if(al)cell.alignment=al;
    if(borde)cell.border=allB;return cell;
  }
  function mg(r,c1,c2,val,bg,fn,al){
    if(c1<c2){try{ws.mergeCells(r,c1,r,c2);}catch(e){}}
    return sc(r,c1,val,bg,fn,al);
  }

  const AZ='FF1A3A6B',AM='FF2563EB',WH='FFFFFFFF',GR='FFF1F5F9';
  const LA='FFF2CF50',ROJO='FFDC2626';

  const CAMPOS=[
    {campo:'COMUNIDAD Y SOCIEDAD',materias:['Comunicación y Lenguajes: Lengua Castellana y Originaria','Lengua Extranjera','Ciencias Sociales','Educación Física y Deportes','Educación Musical','Artes Plásticas y Visuales']},
    {campo:'CIENCIA TECNOLOGÍA Y PRODUCCIÓN',materias:['Matemática','Técnica Tecnológica','Técnica Tecnológica Especializada']},
    {campo:'VIDA TIERRA Y TERRITORIO',materias:['Ciencias Naturales','Ciencias Naturales: Biología - Geografía','Ciencias Naturales: Física','Ciencias Naturales: Química']},
    {campo:'COSMOS Y PENSAMIENTO',materias:['Cosmovisiones, Filosofía y Sicología','Valores, Espiritualidad y Religiones']},
  ];
  const todasMaterias=CAMPOS.flatMap(c=>c.materias);

  // Nueva estructura: B=N°, C=Nombres, D=Materias...
  const CB = 2, CNS = 3; 
  const CM_S = 4; // Las materias ahora empiezan en la columna D (4)
  const CM_E = CM_S + todasMaterias.length - 1;
  const C_PROM = CM_E + 1, C_OBS = C_PROM + 1, NCOLS = C_OBS;

 ws.getColumn(1).width = 0.7;
  ws.getColumn(CB).width = 4;    // N°
  ws.getColumn(CNS).width = 45;   // Aumentamos mucho el ancho para los nombres
  
  // Ancho de materias
  for(let i = CM_S; i <= CM_E; i++) ws.getColumn(i).width = 3.2; 
  
  ws.getColumn(C_PROM).width = 6;
  ws.getColumn(C_OBS).width = 4;

  ws.getRow(1).height=15.6;
  mg(1,CB,NCOLS,'UNIDAD EDUCATIVA TÉCNICO HUMANÍSTICO "FRANZ TAMAYO DE CHACHACOMANI"',AZ,fnt(true,10,'FFFFFFFF'),aln('center','middle'));
  ws.getRow(2).height=17.4;
  mg(2,CB,NCOLS,'CENTRALIZADOR DE NOTAS '+new Date().getFullYear(),AM,fnt(true,11,'FFFFFFFF'),aln('center','middle'));
  ws.getRow(3).height=18;
  mg(3,CB,NCOLS,trimNom[trim],AZ,fnt(true,11,'FFFFFFFF'),aln('center','middle'));
  ws.getRow(4).height=15;
  
// Fila 4: Distrito y Curso
  ws.getRow(4).height = 20;
  mg(4, CB, CNS, 'DISTRITO: ', LA, fnt(true, 10), aln('left', 'middle'));
  mg(4, CM_S, NCOLS, 'AÑO DE ESCOLARIDAD: ' + curso, LA, fnt(true, 10), aln('center', 'middle'));

  // Fila 5: Profesor (Ahora tiene todo el ancho de la izquierda)
  ws.getRow(5).height = 20;
  mg(5, CB, 3, 'PROFESOR(A):', LA, fnt(true, 10), aln('right', 'middle'));
  // El nombre ahora puede ser larguísimo (de columna 4 a la 15)
  mg(5, 4, 15, DOCENTE.nombre, WH, fnt(true, 11), aln('left', 'middle'));
  mg(5, 16, NCOLS, 'NIVEL: SECUNDARIA COMUNITARIA PRODUCTIVA', LA, fnt(true, 9), aln('center', 'middle'));
  ws.getRow(6).height=15.6;
  // Fila 6
  mg(6, CB, 2, 'N°', AZ, fnt(true, 8, WH), aln('center', 'middle'));
  mg(6, CNS, 3, 'APELLIDOS Y NOMBRES', AZ, fnt(true, 9, WH), aln('center', 'middle'));
  mg(6, CM_S, C_PROM, 'CAMPOS DE SABERES Y CONOCIMIENTOS', AZ, fnt(true, 9, WH), aln('center', 'middle'));

  // Fila 7: Ajuste de grupos de materias (ahora empiezan en CM_S)
  mg(7, CM_S, CM_S + 5, 'COMUNIDAD Y SOCIEDAD', AM, fnt(true, 7, WH), aln('center', 'middle'));
  mg(7, CM_S + 6, CM_S + 8, 'C. TEC. Y PRODUCCION', AM, fnt(true, 7, WH), aln('center', 'middle'));
  mg(7, CM_S + 9, CM_S + 12, 'VIDA TIERRA Y TERRITORIO', AM, fnt(true, 7, WH), aln('center', 'middle'));
  mg(7, CM_S + 13, CM_S + 14, 'COSMOS Y PENSAMIENTO', AM, fnt(true, 7, WH), aln('center', 'middle'));

  // Fila 8: Limpiar columnas sobrantes
  sc(8, CB, '', AZ); 
  sc(8, CNS, '', AZ);
  todasMaterias.forEach((mat,i)=>{
    const esActual=mat.toLowerCase()===materia.toLowerCase();
    sc(8,CM_S+i,mat,esActual?AM:AZ,fnt(esActual,7,'FFFFFFFF'),aln('center','bottom',90,false));
  });
  sc(8,C_PROM,'PROMEDIO',AZ,fnt(true,7,'FFFFFFFF'),aln('center','bottom',90,false));
  sc(8,C_OBS,'OBS.',AZ,fnt(true,7,'FFFFFFFF'),aln('center','bottom',90,false));

  const MIN_FILAS=40;
  const idxMateria=todasMaterias.findIndex(m=>m.toLowerCase()===materia.toLowerCase());

  for(let i=0;i<MIN_FILAS;i++){
    const row=9+i; ws.getRow(row).height=15;
    const est=ESTUDIANTES[i]||null; const bg=i%2===0?WH:GR;

    // 1. Número en columna B
    sc(row,CB,est?i+1:'',bg,fnt(false,8),aln('center','middle'));
    
    // 2. Nombre en columna C (Ahora tiene todo el ancho hasta la D)
    sc(row,CNS,est?est.nombre:'',bg,fnt(false,9),aln('left','middle')); 

    // 3. Notas de materias (Empiezan directo en la columna 4 / D)
    for(let j=0;j<todasMaterias.length;j++){
      const col=CM_S+j; // CM_S ahora es 4
      const esActual=j===idxMateria;
      // ... (aquí sigue tu lógica de cálculo de notas exactamente igual)
      if(est&&esActual){
        const serA=ACTIVIDADES.filter(a=>a.dimension==='SER'&&String(a.trimestre)===String(trim));
        const sabA=ACTIVIDADES.filter(a=>a.dimension==='SABER'&&String(a.trimestre)===String(trim));
        const hacA=ACTIVIDADES.filter(a=>a.dimension==='HACER'&&String(a.trimestre)===String(trim));
        function pr(acts){if(!acts.length)return null;const hay=acts.some(a=>NOTAS[est.id]?.[a.id]!==undefined&&NOTAS[est.id]?.[a.id]!=='');if(!hay)return null;const s=acts.reduce((s,a)=>{const n=NOTAS[est.id]?.[a.id];return s+(n!==undefined&&n!==''&&!isNaN(parseFloat(n))?parseFloat(n):0);},0);return s/acts.length;}
        const pS=pr(serA),pB=pr(sabA),pH=pr(hacA);
        const auto=AUTOEVALS[est.id]||0;
        const tot=pS!==null||pB!==null||pH!==null?Math.round((pS||0)+(pB!==null?Math.round(pB*0.45):0)+(pH!==null?Math.round(pH*0.40):0)+auto):null;
        const bgCelda=tot!==null&&tot<51?'FFFFC7CE':tot!==null?'FFFFE699':bg;
        const txtCelda=tot!==null&&tot<51?ROJO:'FF000000';
        sc(row,col,tot!==null?tot:'',bgCelda,fnt(true,8,txtCelda),aln('center','middle'));
      } else {
        sc(row,col,'',bg,null,aln('center','middle'));
      }
    }
    const promEst=idxMateria>=0&&ESTUDIANTES[i]?((()=>{
      const serA=ACTIVIDADES.filter(a=>a.dimension==='SER'&&String(a.trimestre)===String(trim));
      const sabA=ACTIVIDADES.filter(a=>a.dimension==='SABER'&&String(a.trimestre)===String(trim));
      const hacA=ACTIVIDADES.filter(a=>a.dimension==='HACER'&&String(a.trimestre)===String(trim));
      function pr(acts){if(!acts.length)return null;const hay=acts.some(a=>NOTAS[ESTUDIANTES[i].id]?.[a.id]!==undefined&&NOTAS[ESTUDIANTES[i].id]?.[a.id]!=='');if(!hay)return null;const s=acts.reduce((s,a)=>{const n=NOTAS[ESTUDIANTES[i].id]?.[a.id];return s+(n!==undefined&&n!==''&&!isNaN(parseFloat(n))?parseFloat(n):0);},0);return s/acts.length;}
      const pS=pr(serA),pB=pr(sabA),pH=pr(hacA);
      if(pS===null&&pB===null&&pH===null)return null;
      return Math.round((pS||0)+(pB!==null?Math.round(pB*0.45):0)+(pH!==null?Math.round(pH*0.40):0)+(AUTOEVALS[ESTUDIANTES[i].id]||0));
    })()) : null;
    sc(row,C_PROM,promEst!==null?promEst:'',promEst!==null?'FFFFE699':bg,fnt(true,8),aln('center','middle'));
    sc(row,C_OBS,'',bg,null,aln('center','middle'));
  }

 // ===== 1. CÁLCULO DE PROMEDIOS DE APROVECHAMIENTO (TU CÓDIGO ACTUAL) =====
  const rowProm = 9 + MIN_FILAS;
  ws.getRow(rowProm).height = 15;
  
  // CORRECCIÓN: Ahora combinamos solo B y C (CB y CNS) porque ya no existen D y E
  mg(rowProm, CB, CNS, 'PROMEDIO DE APROVECHAMIENTO', LA, fnt(true, 8), aln('center', 'middle'));

  if (idxMateria >= 0) {
    const col = CM_S + idxMateria; // Esto ahora apuntará correctamente a la columna D o posterior
    const promats = ESTUDIANTES.map(e => {
      // ... (tu lógica de promedios se mantiene igual)
      const serA = ACTIVIDADES.filter(a => a.dimension === 'SER' && String(a.trimestre) === String(trim));
      const sabA = ACTIVIDADES.filter(a => a.dimension === 'SABER' && String(a.trimestre) === String(trim));
      const hacA = ACTIVIDADES.filter(a => a.dimension === 'HACER' && String(a.trimestre) === String(trim));
      function pr(acts) { if (!acts.length) return null; const hay = acts.some(a => NOTAS[e.id]?.[a.id] !== undefined && NOTAS[e.id]?.[a.id] !== ''); if (!hay) return null; const s = acts.reduce((s, a) => { const n = NOTAS[e.id]?.[a.id]; return s + (n !== undefined && n !== '' && !isNaN(parseFloat(n)) ? parseFloat(n) : 0); }, 0); return s / acts.length; }
      const pS = pr(serA), pB = pr(sabA), pH = pr(hacA);
      const auto = AUTOEVALS[e.id] || 0;
      return pS !== null || pB !== null || pH !== null ? Math.round((pS || 0) + (pB !== null ? Math.round(pB * 0.45) : 0) + (pH !== null ? Math.round(pH * 0.40) : 0) + auto) : null;
    }).filter(v => v !== null);
    
    const promedio = promats.length ? (promats.reduce((a, b) => a + b, 0) / promats.length).toFixed(2) : 0;
    sc(rowProm, col, parseFloat(promedio), LA, fnt(true, 8), aln('center', 'middle'));
  }

  // Limpiar celdas vacías en la fila de promedios (desde CM_S hasta el final)
  for (let j = 0; j < todasMaterias.length; j++) {
    if (j !== idxMateria) sc(rowProm, CM_S + j, '', LA, fnt(false, 8), aln('center', 'middle'));
  }
  sc(rowProm, C_PROM, '', LA, null, null); sc(rowProm, C_OBS, '', LA, null, null);

  // ===== 2. FIRMA Y FECHA DINÁMICA (CORRECCIÓN) =====
  const rowFirma = rowProm + 2; // Dejamos 2 filas de espacio después del promedio
  ws.getRow(rowFirma).height = 45;

  // Firma del maestro
  mg(rowFirma, CB, 5, '_______________________________', WH, fnt(false, 10), aln('center', 'bottom'));
  
  // Fecha automática alineada a la derecha de la tabla
  const fechaHoy = new Intl.DateTimeFormat('es-ES', { dateStyle: 'full' }).format(new Date());
  mg(rowFirma, 7, NCOLS, 'FECHA: Lugar, ' + fechaHoy, WH, fnt(false, 10), aln('right', 'bottom'));

  ws.getRow(rowFirma + 1).height = 15;
  mg(rowFirma + 1, CB, 5, 'FIRMA DEL MAESTRO(A)', WH, fnt(false, 8, 'FF64748B'), aln('center', 'top'));

  // ===== 3. CONFIGURACIÓN DE IMPRESIÓN =====
  // Usamos colL que es como definiste la función al inicio de este bloque
  ws.pageSetup.printArea = 'B1:' + colL(NCOLS) + (rowFirma + 2);
  ws.pageSetup.showGridLines = false; // False para que no se impriman las celdas vacías fuera de la tabla
  ws.pageSetup.printTitlesRow = '1:8';
}
